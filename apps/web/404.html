<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Pagina niet gevonden — Buurtscan</title>
  <meta name="robots" content="noindex, follow" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🏠%3C/text%3E%3C/svg%3E" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      font-family: -apple-system, BlinkMacSystemFont, "Inter", "Helvetica Neue", sans-serif;
      color: #1a1a1a; background: #fafaf7; line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }
    .page {
      max-width: 520px;
      margin: 0 auto;
      padding: 6rem 1.5rem 2rem;
      text-align: center;
    }
    .emoji { font-size: 4rem; margin-bottom: 1.5rem; display: block; }
    h1 {
      font-size: 2rem; letter-spacing: -0.02em;
      font-weight: 700; margin: 0 0 0.75rem;
    }
    h1 em { color: #1f4536; font-style: italic; font-weight: 400; }
    p {
      color: #6b6b6b; font-size: 1.05rem;
      line-height: 1.55; margin: 0 0 2rem;
    }
    .actions {
      display: flex; gap: 0.75rem;
      justify-content: center; flex-wrap: wrap;
    }
    .btn {
      display: inline-flex; align-items: center; gap: 0.4rem;
      padding: 0.7rem 1.3rem;
      font-size: 0.95rem; font-weight: 500;
      border-radius: 6px; text-decoration: none;
      transition: background 0.15s, transform 0.05s;
    }
    .btn-primary { background: #1f4536; color: #fff; border: 1px solid #1f4536; }
    .btn-primary:hover { background: #163428; }
    .btn-secondary {
      background: transparent; color: #1f4536;
      border: 1px solid #d0d8d4;
    }
    .btn-secondary:hover { background: #eef3f0; }
    .footer-hint {
      margin-top: 3rem; font-size: 0.85rem;
      color: #9a9a9a; line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="page">
    <span class="emoji">🏚️</span>
    <h1>Dit adres <em>bestaat niet</em>.</h1>
    <p>
      De pagina die je zoekt is er niet (meer).
      Misschien is er een linkje verouderd,
      of heb je een typefout gemaakt.
    </p>
    <div class="actions">
      <a href="/" class="btn btn-primary">← Terug naar Buurtscan</a>
      <a href="/over" class="btn btn-secondary">Over Buurtscan</a>
    </div>
    <p class="footer-hint">
      Heb je een gebroken link gevonden?
      <a href="mailto:redactie@buurtscan.nl" style="color: #1f4536;">
        redactie@buurtscan.nl
      </a>
    </p>
  </div>
</body>
</html>
