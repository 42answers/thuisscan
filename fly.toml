# fly.toml app configuration file generated for buurtscan on 2026-04-21T11:53:02+02:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'buurtscan'
primary_region = 'ams'

[build]

[env]
  PORT = '8000'

[[mounts]]
  source = 'thuisscan_cache'
  destination = '/app/apps/api/cache'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/health'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
