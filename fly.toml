# Fly.io config voor Thuisscan (single-container, NL-region).
# `fly launch --copy-config --no-deploy` om initieel te registreren.

app = "thuisscan"
primary_region = "ams"  # Amsterdam — laagste latency voor NL-data + NL-users

[build]
  # Geen builder; Dockerfile in repo-root wordt automatisch gebruikt

[env]
  PORT = "8000"

[http_service]
  internal_port = 8000
  force_https = true
  # Auto-stop spaart resources tijdens MVP-fase. Bij eerste request boot
  # de machine in ~500ms — sneller dan Render's cold-start van 30s omdat
  # Fly de container al gepuld in cache heeft.
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/health"

# Persistent volume voor de RVO EP-Online SQLite (1 GB, regenereerbaar via
# sync-script). Mount op het pad dat rvo_ep.py al kent — geen code-wijziging
# nodig. 3 GB volume is binnen Fly's free tier.
[mounts]
  source = "thuisscan_cache"
  destination = "/app/apps/api/cache"

# 512 MB RAM is ruim voor uvicorn + httpx + SQLite reads. Fly free tier is
# 3x shared-cpu-1x machines = exact wat we nodig hebben (1 prod + headroom).
[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
