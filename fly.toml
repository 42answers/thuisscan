# fly.toml app configuration file generated for buurtscan on 2026-04-21T11:53:02+02:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'buurtscan'
primary_region = 'ams'

[build]

[env]
  PORT = '8000'

[[mounts]]
  source = 'thuisscan_cache'
  destination = '/app/apps/api/cache'

[http_service]
  internal_port = 8000
  force_https = true
  # Na eerste deploy: machine mag slapen bij HTTP-idle (goedkoper).
  # Wakker bij eerste request kost ~500ms cold-start.
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/health'

[[vm]]
  # 1GB nodig voor headless Chromium in /rapport.pdf endpoint.
  # Een lege Chromium-instance neemt ~150MB; per page-render piekt
  # naar ~300-500MB. 512MB was te krap → OOM bij PDF-genereren.
  size = 'shared-cpu-1x'
  memory = '1gb'
